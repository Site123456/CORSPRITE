name: C/C++ CI (Windows x64)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # Install MSYS2 + MinGW-w64 toolchain
    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-g++
          mingw-w64-x86_64-make
          mingw-w64-x86_64-glfw
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-toolchain

    # Build using MinGW make
    - name: Build (mingw32-make)
      shell: msys2 {0}
      run: |
        mingw32-make

    - name: Clean
      shell: msys2 {0}
      run: |
        mingw32-make clean
